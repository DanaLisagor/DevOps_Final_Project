apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-flask-cronjob
spec:
  schedule: "{{ .Values.cronjob.schedule }}"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: hello-cron
            image: "{{ .Values.cronjob.image }}"
            command: ["sh", "-c", "{{ .Values.cronjob.command }}"]
          restartPolicy: OnFailure
